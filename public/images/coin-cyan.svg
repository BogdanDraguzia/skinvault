<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coinShine">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer coin circle with gradient -->
  <circle cx="12" cy="12" r="10" fill="url(#coinGradient)" filter="url(#coinShadow)"/>

  <!-- Inner circle for depth -->
  <circle cx="12" cy="12" r="8.5" stroke="#0891b2" stroke-width="0.5" fill="none" opacity="0.6"/>

  <!-- € Symbol -->
  <text x="12" y="16" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">€</text>

  <!-- Highlight shine effect -->
  <circle cx="9" cy="9" r="4" fill="url(#coinShine)"/>

  <!-- Edge notches for coin effect -->
  <path d="M 12 2 A 10 10 0 0 1 22 12" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.2"/>
</svg>
