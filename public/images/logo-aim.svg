<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with gradient -->
  <defs>
    <linearGradient id="aimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer targeting ring -->
  <circle cx="16" cy="16" r="14" stroke="url(#aimGradient)" stroke-width="2" fill="none" filter="url(#glow)"/>

  <!-- Middle ring -->
  <circle cx="16" cy="16" r="9" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Inner center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#06b6d4"/>

  <!-- Crosshair lines - vertical -->
  <line x1="16" y1="2" x2="16" y2="9" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="30" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>

  <!-- Crosshair lines - horizontal -->
  <line x1="2" y1="16" x2="9" y2="16" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="30" y2="16" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>

  <!-- Corner brackets - top left -->
  <path d="M 4 8 L 4 4 L 8 4" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets - top right -->
  <path d="M 24 4 L 28 4 L 28 8" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets - bottom left -->
  <path d="M 4 24 L 4 28 L 8 28" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Corner brackets - bottom right -->
  <path d="M 28 24 L 28 28 L 24 28" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
