<svg width="800" height="1200" viewBox="0 0 800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1729;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.1" />
    </linearGradient>

    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
    </pattern>

    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#06b6d4" opacity="0.2"/>
    </pattern>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="800" height="1200" fill="url(#bgGradient)"/>

  <!-- Grid pattern overlay -->
  <rect width="800" height="1200" fill="url(#grid)"/>

  <!-- Dot pattern -->
  <rect width="800" height="1200" fill="url(#dots)" opacity="0.3"/>

  <!-- Large glowing orbs -->
  <circle cx="200" cy="300" r="250" fill="url(#glowGradient)" filter="url(#glow)" opacity="0.4"/>
  <circle cx="600" cy="800" r="300" fill="url(#glowGradient)" filter="url(#glow)" opacity="0.3"/>
  <circle cx="100" cy="900" r="200" fill="url(#glowGradient)" filter="url(#glow)" opacity="0.25"/>

  <!-- Tech circuit lines -->
  <g opacity="0.15" stroke="#06b6d4" stroke-width="1.5" fill="none">
    <!-- Vertical lines -->
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="350" y1="200" x2="350" y2="800"/>
    <line x1="550" y1="100" x2="550" y2="600"/>
    <line x1="650" y1="400" x2="650" y2="1200"/>

    <!-- Horizontal lines -->
    <line x1="100" y1="250" x2="700" y2="250"/>
    <line x1="0" y1="550" x2="600" y2="550"/>
    <line x1="200" y1="850" x2="800" y2="850"/>

    <!-- Connection nodes -->
    <circle cx="150" cy="250" r="4" fill="#06b6d4"/>
    <circle cx="350" cy="250" r="4" fill="#06b6d4"/>
    <circle cx="350" cy="550" r="4" fill="#06b6d4"/>
    <circle cx="550" cy="550" r="4" fill="#06b6d4"/>
    <circle cx="650" cy="850" r="4" fill="#06b6d4"/>
  </g>

  <!-- Crosshair/aim elements -->
  <g opacity="0.1" stroke="#06b6d4" stroke-width="2" fill="none">
    <!-- Top left crosshair -->
    <circle cx="100" cy="100" r="30"/>
    <line x1="100" y1="70" x2="100" y2="85"/>
    <line x1="100" y1="115" x2="100" y2="130"/>
    <line x1="70" y1="100" x2="85" y2="100"/>
    <line x1="115" y1="100" x2="130" y2="100"/>

    <!-- Bottom right crosshair -->
    <circle cx="700" cy="1100" r="25"/>
    <line x1="700" y1="1075" x2="700" y2="1088"/>
    <line x1="700" y1="1112" x2="700" y2="1125"/>
    <line x1="675" y1="1100" x2="688" y2="1100"/>
    <line x1="712" y1="1100" x2="725" y2="1100"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.3" fill="#06b6d4">
    <circle cx="120" cy="450" r="2"/>
    <circle cx="280" cy="680" r="1.5"/>
    <circle cx="520" cy="320" r="2"/>
    <circle cx="680" cy="580" r="1.5"/>
    <circle cx="240" cy="920" r="2"/>
    <circle cx="580" cy="150" r="1.5"/>
    <circle cx="320" cy="1050" r="2"/>
    <circle cx="750" cy="420" r="1.5"/>
  </g>

  <!-- Scanline effect (optional - animated in CSS) -->
  <rect width="800" height="2" y="0" fill="url(#glowGradient)" opacity="0.2">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 1200" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
